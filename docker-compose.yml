services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Whitelist 4lw commands so ruok/srvr work for ad-hoc debugging
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    healthcheck:
      # cub is Confluent's purpose-built readiness utility, bundled in the image
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout: 35s
      retries: 10
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      # Wait for 1 broker on this listener to be ready
      test: ["CMD", "cub", "kafka-ready", "-b", "localhost:9092", "1", "30"]
      interval: 15s
      timeout: 35s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto -d crypto"]
      interval: 5s
      timeout: 5s
      retries: 10

  producer:
    build: ./producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: crypto-prices
      COINS: bitcoin,ethereum,solana,cardano,ripple
      VS_CURRENCY: usd
      POLL_INTERVAL_SECONDS: "15"
    restart: unless-stopped

  consumer:
    build: ./consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: crypto-prices
      KAFKA_GROUP: crypto-consumer
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: crypto
      PG_USER: crypto
      PG_PASSWORD: crypto
      WINDOW_SIZE: "20"
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: crypto
      PG_USER: crypto
      PG_PASSWORD: crypto
      REFRESH_SECONDS: "10"
    restart: unless-stopped

volumes:
  postgres_data:
