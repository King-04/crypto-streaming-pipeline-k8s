# Secret holds sensitive values. By default these are base64-encoded
# (NOT encrypted) inside etcd — fine for local learning, but in production
# use Sealed Secrets, External Secrets Operator, or a vault integration.
#
# To decode locally: echo "Y3J5cHRv" | base64 -d  →  crypto
#
# Using `stringData` instead of `data` lets us write plain strings; K8s
# encodes them automatically when the manifest is applied.
apiVersion: v1
kind: Secret
metadata:
  name: crypto-secrets
  namespace: crypto-pipeline
type: Opaque
stringData:
  postgres-user: crypto
  postgres-password: crypto
