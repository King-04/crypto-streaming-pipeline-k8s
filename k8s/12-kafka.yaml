# Headless Service for Kafka
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: crypto-pipeline
  labels:
    app: kafka
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: crypto-pipeline
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1
          ports:
            - name: broker
              containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            # Point at the Zookeeper StatefulSet pod via its stable DNS name
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper-0.zookeeper.crypto-pipeline.svc.cluster.local:2181"
            # The advertised listener must be reachable by clients in-cluster.
            # We use the StatefulSet pod's full FQDN so consumers can find this
            # broker after the initial bootstrap.
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-0.kafka.crypto-pipeline.svc.cluster.local:9092"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            # Single-broker cluster — replication factors MUST be 1 or
            # internal topics (__consumer_offsets etc) won't be creatable.
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            # 3 partitions so we can scale the consumer Deployment up to 3
            # replicas and watch Kafka actually split the workload.
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
          readinessProbe:
            exec:
              command: ["cub", "kafka-ready", "-b", "localhost:9092", "1", "10"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 2Gi } }
